<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracker</title>
</head>
<body>
    <h1>Bug Tracker</h1>
    <h2 id="countDisplay">Bugs remaining: <span>0</span></h2>
    <form id="form">
    <input id="bugInput" type="text" placeholder="Describe bug..." required>
    <button type="submit">Submit</button>
    </form>
    <div><button id="allBtn">All Bugs</button><button id="unfixedBtn">Unfixed Bugs</button><button id="fixedBtn">Fixed Bugs</button></div>
    <ul id="bugList"></ul>
    
</body>
<script src="script.js"></script>
</html>
